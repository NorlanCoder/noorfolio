<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Prévisualisation de PDF</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Mémoire de licence</h1>

    <p class="subtitle">
      Prévisualisation en ligne du document
      <strong>Memoire_Licence_Motos_electriques_Nooryath_FOUSSENI.pdf</strong>
      et téléchargement direct.
    </p>

    <div class="actions">
      <a id="downloadLink" class="btn" href="Memoire_Licence_Motos_electriques_Nooryath_FOUSSENI.pdf" download="Memoire_Licence_Motos_electriques_Nooryath_FOUSSENI.pdf">
        Télécharger le mémoire
      </a>
    </div>

    <div id="preview" class="preview">
      <h2>Aperçu du PDF</h2>
      <iframe
        id="pdfFrame"
        src="Memoire_Licence_Motos_electriques_Nooryath_FOUSSENI.pdf"
        frameborder="0"
      ></iframe>
    </div>
  </div>

  <!-- script.js n'est plus indispensable mais on le garde au cas où -->
  <!-- <script src="script.js"></script> -->
</body>
</html>
